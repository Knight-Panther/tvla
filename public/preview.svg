<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative number tiles -->
  <rect x="60"  y="80"  width="110" height="110" rx="22" fill="#ef4444" opacity="0.9"/>
  <text x="115" y="155" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">3</text>

  <rect x="200" y="40"  width="110" height="110" rx="22" fill="#f97316" opacity="0.9"/>
  <text x="255" y="115" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">7</text>

  <rect x="1010" y="60"  width="110" height="110" rx="22" fill="#22c55e" opacity="0.9"/>
  <text x="1065" y="135" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">1</text>

  <rect x="1060" y="200" width="110" height="110" rx="22" fill="#ec4899" opacity="0.9"/>
  <text x="1115" y="275" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">9</text>

  <rect x="60"  y="440" width="110" height="110" rx="22" fill="#3b82f6" opacity="0.9"/>
  <text x="115" y="515" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">5</text>

  <rect x="1040" y="430" width="130" height="110" rx="22" fill="#f43f5e" opacity="0.9"/>
  <text x="1105" y="505" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">10</text>

  <rect x="200" y="470" width="110" height="110" rx="22" fill="#eab308" opacity="0.9"/>
  <text x="255" y="545" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">2</text>

  <rect x="880" y="450" width="110" height="110" rx="22" fill="#8b5cf6" opacity="0.9"/>
  <text x="935" y="525" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">6</text>

