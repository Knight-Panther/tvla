  <!-- Subtitle -->
  <text x="600" y="380" font-family="Noto Sans Georgian, Arial, sans-serif" font-size="38" font-weight="700" fill="#c4b5fd" text-anchor="middle">იპოვე ციფრი — Find the Number</text>
