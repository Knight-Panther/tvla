<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#312e81"/>
      <stop offset="55%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip">
      <circle cx="256" cy="256" r="252"/>
    </clipPath>
  </defs>

  <!-- Base circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Everything clipped to circle -->
  <g clip-path="url(#clip)">

    <!-- Shine overlay -->
    <ellipse cx="256" cy="160" rx="200" ry="180" fill="url(#shine)"/>

    <!-- Colorful number tiles — scattered around the text -->

    <!-- top-left -->
    <rect x="52"  y="98"  width="72" height="72" rx="18" fill="#ef4444"/>
    <text x="88"  y="149" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="38" font-weight="900" fill="white">7</text>

    <!-- top-right -->
    <rect x="388" y="90"  width="72" height="72" rx="18" fill="#22c55e"/>
    <text x="424" y="141" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="38" font-weight="900" fill="white">3</text>

    <!-- mid-left -->
    <rect x="28"  y="234" width="78" height="72" rx="18" fill="#06b6d4"/>
    <text x="67"  y="285" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="white">15</text>

    <!-- mid-right -->
    <rect x="406" y="230" width="72" height="72" rx="18" fill="#f97316"/>
    <text x="442" y="281" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="38" font-weight="900" fill="white">9</text>

    <!-- bottom-left -->
    <rect x="62"  y="350" width="78" height="72" rx="18" fill="#eab308"/>
    <text x="101" y="401" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="white">20</text>

    <!-- bottom-right -->
    <rect x="372" y="348" width="72" height="72" rx="18" fill="#ec4899"/>
    <text x="408" y="399" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="38" font-weight="900" fill="white">1</text>

    <!-- bottom-center small -->
    <rect x="216" y="380" width="80" height="68" rx="18" fill="#a855f7"/>
    <text x="256" y="428" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="white">10</text>

    <!-- TVALE main text -->
    <text x="256" y="226"
      text-anchor="middle"
      font-family="Arial Black, Impact, sans-serif"
      font-size="100"
      font-weight="900"
      fill="white"
      letter-spacing="4"
      style="text-shadow: 0 4px 16px rgba(0,0,0,0.4)">TVALE</text>

    <!-- Divider line -->
    <rect x="148" y="242" width="216" height="5" rx="3" fill="rgba(255,255,255,0.35)"/>

    <!-- Subtitle -->
    <text x="256" y="290"
      text-anchor="middle"
      font-family="Arial, sans-serif"
      font-size="30"
      font-weight="700"
      fill="rgba(255,255,255,0.65)"
      letter-spacing="3">0 — 20</text>

    <!-- Decorative dots top -->
    <circle cx="190" cy="72" r="10" fill="#fbbf24" opacity="0.8"/>
    <circle cx="256" cy="52" r="14" fill="#f43f5e" opacity="0.8"/>
    <circle cx="322" cy="72" r="10" fill="#34d399" opacity="0.8"/>

  </g>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="6"/>
</svg>
